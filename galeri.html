<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri RAVEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-animate {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#02060E] text-white font-sans antialiased overflow-x-hidden pt-24">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-[#02060E] backdrop-blur-md border-b border-white/10">
        <div class="text-2xl font-extrabold tracking-tighter">RA<span class="text-[#9303C5]">VEN.</span></div>
        <div class="flex gap-4">
            <a href="index.html" class="text-white hover:text-[#9303C5] font-medium transition-colors">Home</a>
            <a href="galeri.html" class="text-[#9303C5] font-bold border-b-2 border-[#9303C5] pb-1">Galeri</a>
            <a href="kontak.html" class="text-white hover:text-[#9303C5] font-medium transition-colors">Kontak</a>
        </div>
    </nav>

    <section class="py-10 px-10 md:px-20 min-h-screen">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-10 tracking-tight text-white text-animate">
                Karya <span class="text-[#9303C5]">Terbaru.</span>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 auto-rows-[250px]">
                <div class="col-span-1 md:col-span-2 bg-[#02060E] rounded-3xl overflow-hidden relative group hover:scale-[1.02] transition-transform duration-300 text-animate" style="animation-delay: 0.1s;">
                    <div class="w-full h-full bg-indigo-600 flex items-center justify-center">
                        <span class="text-white/50 font-bold tracking-widest">POSTER UTAMA</span>
                    </div>
                </div>
                
                <div class="bg-[#02060E] rounded-3xl overflow-hidden relative group hover:scale-[1.02] transition-transform duration-300 text-animate" style="animation-delay: 0.2s;">
                    <div class="w-full h-full bg-purple-600 flex items-center justify-center">
                        <span class="text-white/50 font-bold tracking-widest">POSTER 2</span>
                    </div>
                </div>
                
                <div class="bg-[#02060E] rounded-3xl overflow-hidden relative group hover:scale-[1.02] transition-transform duration-300 text-animate" style="animation-delay: 0.3s;">
                    <div class="w-full h-full bg-pink-600 flex items-center justify-center">
                        <span class="text-white/50 font-bold tracking-widest">POSTER 3</span>
                    </div>
                </div>
                
                <div class="col-span-1 md:col-span-2 bg-[#02060E] rounded-3xl overflow-hidden relative group hover:scale-[1.02] transition-transform duration-300 text-animate" style="animation-delay: 0.4s;">
                    <div class="w-full h-full bg-blue-600 flex items-center justify-center">
                        <span class="text-white/50 font-bold tracking-widest">POSTER 4</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
