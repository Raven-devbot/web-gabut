<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Kekinian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efek animasi teks masuk */
        .text-animate {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased overflow-x-hidden">

    <!-- Split Background Hero Section -->
    <main class="min-h-screen flex flex-col md:flex-row">

        <!-- Kiri: Area Teks & Form -->
        <section class="w-full md:w-1/2 flex flex-col justify-center px-10 md:px-20 py-16 bg-gray-900">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 text-animate">
                Bikin Karya.<br>
                <span class="text-green-400">Tanpa Batas.</span>
            </h1>
            <p class="text-lg text-gray-400 mb-10 text-animate" style="animation-delay: 0.1s;">
                Platform revolusioner untuk mengubah ide gila menjadi realitas digital.
            </p>

            <!-- Pill-shaped Input & Button -->
            <div class="flex items-center bg-gray-800 rounded-full p-2 w-full max-w-md text-animate" style="animation-delay: 0.2s;">
                <input type="email" placeholder="Masukkan email kamu..." class="bg-transparent border-none outline-none text-white px-6 w-full placeholder-gray-500">
                <button class="bg-green-400 text-gray-900 font-bold py-3 px-8 rounded-full hover:bg-green-300 transition-transform duration-300 hover:scale-105">
                    Daftar
                </button>
            </div>
        </section>

        <!-- Kanan: Area Visual (Split) -->
        <section class="w-full md:w-1/2 bg-indigo-600 flex items-center justify-center p-10 relative overflow-hidden text-animate" style="animation-delay: 0.3s;">
            <!-- Placeholder untuk aset 3D atau gambar abstrak -->
            <div class="w-64 h-64 bg-white/10 backdrop-blur-lg rounded-3xl border border-white/20 animate-pulse flex items-center justify-center shadow-2xl">
                <span class="text-white/60 font-medium tracking-widest">3D / VISUAL ASSET</span>
            </div>
        </section>

    </main>

</body>
</html>
