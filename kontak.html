<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Portofolio Gen Z</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A0A0A] text-white font-sans antialiased overflow-x-hidden pt-24">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-[#0A0A0A]/90 backdrop-blur-md border-b border-white/10">
        <div class="text-2xl font-extrabold tracking-tighter">LO<span class="text-green-400">GO.</span></div>
        <div class="flex gap-4">
            <a href="index.html" class="text-white hover:text-green-400 font-medium transition-colors">Home</a>
            <a href="galeri.html" class="text-white hover:text-green-400 font-medium transition-colors">Galeri</a>
            <a href="kontak.html" class="text-green-400 font-bold border-b-2 border-green-400 pb-1">Kontak</a>
        </div>
    </nav>

    <section class="py-10 px-10 md:px-20 min-h-screen flex items-center">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-16 w-full">
            
            <div class="w-full md:w-1/2 flex flex-col justify-center">
                <h2 class="text-4xl md:text-5xl font-extrabold mb-6 tracking-tight text-white">
                    Let's <span class="text-green-400">Connect.</span>
                </h2>
                <p class="text-gray-400 mb-10 text-lg">
                    Punya ide kolaborasi gila atau sekadar mau say hi? Jangan ragu buat mampir ke DM gue.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="#" class="px-6 py-3 bg-gray-800 text-white rounded-full font-medium hover:bg-green-400 hover:text-black transition-colors duration-300">Instagram 📸</a>
                    <a href="#" class="px-6 py-3 bg-gray-800 text-white rounded-full font-medium hover:bg-green-400 hover:text-black transition-colors duration-300">Behance 🎨</a>
                    <a href="#" class="px-6 py-3 bg-gray-800 text-white rounded-full font-medium hover:bg-green-400 hover:text-black transition-colors duration-300">Email ✉️</a>
                </div>
            </div>

            <div class="w-full md:w-1/2">
                <form class="bg-gray-800/50 backdrop-blur-sm p-8 rounded-3xl border border-white/10">
                    <h3 class="text-2xl font-bold mb-6 text-white">Kirim Pesan</h3>
                    <div class="mb-5">
                        <label class="block text-gray-400 text-sm font-bold mb-2">Nama Lo</label>
                        <input class="w-full bg-gray-900 text-white border border-gray-700 rounded-xl py-3 px-4 focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400" type="text" placeholder="John Doe">
                    </div>
                    <div class="mb-5">
                        <label class="block text-gray-400 text-sm font-bold mb-2">Email</label>
                        <input class="w-full bg-gray-900 text-white border border-gray-700 rounded-xl py-3 px-4 focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400" type="email" placeholder="john@example.com">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-400 text-sm font-bold mb-2">Pesan</label>
                        <textarea class="w-full bg-gray-900 text-white border border-gray-700 rounded-xl py-3 px-4 focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400 h-32 resize-none" placeholder="Ketik pesan lo di sini..."></textarea>
                    </div>
                    <button class="w-full bg-green-400 text-black font-bold py-4 px-8 rounded-xl hover:bg-green-300 hover:scale-[1.02] transition-transform duration-300" type="button">
                        Kirim Sekarang 🚀
                    </button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
